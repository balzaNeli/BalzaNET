<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BalzaNET — Finalizar Assinatura</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style_balzanet.css">
    <style>
        /* Estilos específicos para o Checkout */
        body {
            background-color: var(--color-dark-900);
            color: var(--color-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .checkout-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }

        .checkout-form, .order-summary {
            background: var(--color-dark-800);
            border: 1px solid var(--color-dark-700);
            border-radius: 12px;
            padding: 30px;
        }

        h2 {
            font-family: var(--font-display);
            color: var(--color-brand-gold);
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--color-dark-200);
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: var(--color-dark-900);
            border: 1px solid var(--color-dark-700);
            color: white;
            border-radius: 8px;
            outline: none;
        }

        input:focus { border-color: var(--color-brand-gold); }

        /* Payment Tabs */
        .payment-methods {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .method-card {
            flex: 1;
            padding: 15px;
            border: 1px solid var(--color-dark-700);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: var(--ease-smooth);
        }

        .method-card.active {
            border-color: var(--color-brand-gold);
            background: rgba(235, 179, 86, 0.1);
        }

        .hidden { display: none !important; }

        /* Resumo */
        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--color-dark-700);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 1.3rem;
            margin-top: 20px;
        }

        @media (max-width: 850px) {
            .checkout-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="checkout-form">
            <h2>Informações Pessoais</h2>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Como no cartão">
            </div>
            <div class="form-group">
                <label>E-mail para instalação</label>
                <input type="email" placeholder="contato@exemplo.com">
            </div>

            <h2 style="margin-top: 30px;">Método de Pagamento</h2>
            <div class="payment-methods">
                <div class="method-card active" id="btn-cartao" onclick="selecionarMetodo('cartao')">
                    <span style="display:block; font-size: 1.2rem;">💳</span>
                    <span style="font-size: 0.8rem; font-weight: 700;">Cartão</span>
                </div>
                <div class="method-card" id="btn-pix" onclick="selecionarMetodo('pix')">
                    <span style="display:block; font-size: 1.2rem;">📄</span>
                    <span style="font-size: 0.8rem; font-weight: 700;">PIX</span>
                </div>
            </div>

            <div id="dados-cartao">
                <div class="form-group">
                    <label>Número do Cartão</label>
                    <input type="text" placeholder="0000 0000 0000 0000">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 2;">
                        <label>Validade</label>
                        <input type="text" placeholder="MM/AA">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="text" placeholder="123">
                    </div>
                </div>
            </div>

            <div id="dados-pix" class="hidden" style="text-align: center; padding: 20px; background: var(--color-dark-900); border-radius: 8px;">
                <p style="font-size: 0.9rem; margin-bottom: 15px;">Escaneie o QR Code abaixo</p>
                <div style="width: 140px; height: 140px; background: white; margin: 0 auto 15px; padding: 10px;">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=BalzaNET-PIX" alt="QR Code" style="width: 100%;">
                </div>
                <p style="font-size: 0.8rem; color: var(--color-brand-gold);">Aprovação instantânea</p>
            </div>

            <button class="btn-primary" style="width: 100%; margin-top: 30px; padding: 15px;">Finalizar Assinatura</button>
        </div>

        <div class="order-summary">
            <h2>Resumo</h2>
            <div class="item-row">
                <div>
                    <strong style="display:block">Plano Gamer</strong>
                    <span style="font-size: 0.8rem; color: var(--color-dark-400);">600 Mega + Wi-Fi 6</span>
                </div>
                <span>R$ 129,90</span>
            </div>
            <div class="item-row" style="border: none;">
                <span>Taxa de Instalação</span>
                <span style="color: #2ed573;">Grátis</span>
            </div>
            
            <div class="total-row">
                <span>Total</span>
                <span>R$ 129,90</span>
            </div>
            <p style="font-size: 0.7rem; color: #666; margin-top: 25px; text-align: center; line-height: 1.4;">
                Ao clicar em finalizar, você concorda com os termos de serviço da BalzaNET.
            </p>
        </div>
    </div>

    <script>
        function selecionarMetodo(metodo) {
            const btnCartao = document.getElementById('btn-cartao');
            const btnPix = document.getElementById('btn-pix');
            const divCartao = document.getElementById('dados-cartao');
            const divPix = document.getElementById('dados-pix');

            if (metodo === 'cartao') {
                btnCartao.classList.add('active');
                btnPix.classList.remove('active');
                divCartao.classList.remove('hidden');
                divPix.classList.add('hidden');
            } else {
                btnPix.classList.add('active');
                btnCartao.classList.remove('active');
                divPix.classList.remove('hidden');
                divCartao.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
